<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polímata Hub - Perfil</title>
    <style>
        /* --- VARIÁVEIS DE COR E TEMA --- */
        :root {
            --slate-950: #020617;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --slate-500: #64748b;
            --slate-400: #94a3b8;
            --slate-300: #cbd5e1;
            --slate-200: #e2e8f0;
            --slate-100: #f1f5f9;
            --indigo-400: #818cf8;
            --indigo-500: #6366f1;
            --indigo-600: #4f46e5;
            --purple-400: #c084fc;
            --purple-500: #a855f7;
            --purple-600: #9333ea;
            --emerald-400: #34d399;
            --emerald-500: #10b981;
        }

        /* --- ESTILOS DE LOGIN --- */
        #login-screen {
            position: fixed; inset: 0; background: var(--slate-950);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 0.5s;
        }
        .btn-google {
            background: white; color: #0f172a; border: none; padding: 12px 24px;
            border-radius: 12px; font-weight: 700; cursor: pointer; 
            display: flex; align-items: center; gap: 12px; font-size: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); transition: transform 0.2s;
        }
        .btn-google:hover { transform: scale(1.05); }
        .hidden { display: none !important; }
        
        .user-nav { display: flex; align-items: center; gap: 1rem; }
        .user-photo { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--indigo-500); }
        .btn-logout { background: none; border: none; color: #f87171; cursor: pointer; font-size: 12px; font-weight: 600; }

        /* --- RESET E BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background-color: var(--slate-950); color: var(--slate-100); min-height: 100vh; overflow-x: hidden; }

        /* --- LAYOUT --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
        header { 
            border-bottom: 1px solid var(--slate-800); background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 50;
        }
        .header-content { height: 4.5rem; display: flex; align-items: center; justify-content: space-between; }
        
        .brand { display: flex; align-items: center; gap: 0.75rem; }
        .brand h1 {
            font-size: 1.25rem; font-weight: 800;
            background: linear-gradient(to right, var(--indigo-400), var(--purple-400));
            -webkit-background-clip: text; color: transparent;
        }

        main { padding: 2rem 0; display: grid; grid-template-columns: 1fr; gap: 2rem; }
        @media (min-width: 1024px) { main { grid-template-columns: 350px 1fr; } }

        /* --- COMPONENTES --- */
        .panel {
            background: rgba(15, 23, 42, 0.6); border-radius: 1.5rem;
            border: 1px solid var(--slate-800); padding: 2rem;
        }

        .profile-panel { text-align: center; position: relative; }
        .avatar {
            width: 8rem; height: 8rem; border-radius: 50%; margin: 0 auto 1.5rem;
            border: 4px solid var(--slate-800); background: var(--slate-900);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .level-box { background: var(--slate-900); padding: 1.25rem; border-radius: 1rem; margin-top: 1.5rem; }
        .progress-track { background: var(--slate-950); height: 8px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: linear-gradient(to right, var(--indigo-500), var(--purple-500)); height: 100%; transition: width 1s; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
        .stat-item { background: var(--slate-950); padding: 1rem; border-radius: 0.75rem; border: 1px solid var(--slate-800); }
        .stat-val { display: block; font-size: 1.25rem; font-weight: 800; color: white; }
        .stat-label { font-size: 0.7rem; color: var(--slate-500); text-transform: uppercase; }

        .btn-primary {
            width: 100%; background: linear-gradient(to right, var(--indigo-600), var(--purple-600));
            color: white; border: none; padding: 1rem; border-radius: 1rem; font-weight: 700;
            cursor: pointer; margin-top: 1.5rem; transition: 0.3s;
        }

        .quest-item {
            background: var(--slate-900); padding: 1rem; border-radius: 1rem; margin-bottom: 0.75rem;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent;
        }
        .quest-item.completed { border-color: var(--emerald-500); opacity: 0.7; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: white; font-size: 2.5rem; margin-bottom: 2rem; font-weight: 900;">Polímata Hub</h1>
        <button onclick="handleLogin()" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Entrar com Google
        </button>
    </div>

    <header>
        <div class="container header-content">
            <div class="brand">
                <h1>Polímata Hub</h1>
            </div>
            <div id="user-nav" class="user-nav hidden">
                <div style="text-align: right">
                    <div id="user-display-name" style="font-size: 0.8rem; font-weight: 700;">Usuário</div>
                    <button onclick="handleLogout()" class="btn-logout">Sair</button>
                </div>
                <img id="user-nav-photo" class="user-photo" src="">
            </div>
        </div>
    </header>

    <main class="container">
        <aside>
            <div class="panel profile-panel">
                <div class="avatar">
                    <img id="profile-img" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar">
                </div>
                <h2 class="profile-name" id="display-name">Carregando...</h2>
                <p class="profile-title">Explorador de Conhecimento</p>

                <div class="level-box">
                    <div style="display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 700;">
                        <span>NÍVEL GERAL</span>
                        <span id="level-txt">14</span>
                    </div>
                    <div class="progress-track">
                        <div id="exp-bar" class="progress-fill" style="width: 70%"></div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-val">24</span>
                        <span class="stat-label">Missões</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-val">12</span>
                        <span class="stat-label">Ofensiva</span>
                    </div>
                </div>

                <button onclick="window.location.href='index.html'" class="btn-primary">
                    Visualizar Roda Polímata
                </button>
            </div>
        </aside>

        <section>
            <div class="panel">
                <h3 style="margin-bottom: 1.5rem; font-size: 1rem; color: var(--slate-400)">MISSÕES DIÁRIAS</h3>
                <div id="quests-container">
                    <div class="quest-item">
                        <div>
                            <div style="font-weight: 700;">Estudar Engenharia de Software</div>
                            <div style="font-size: 0.75rem; color: var(--slate-500);">60 min • Foco</div>
                        </div>
                        <span style="color: var(--indigo-400); font-weight: 800;">+50 XP</span>
                    </div>
                    <div class="quest-item">
                        <div>
                            <div style="font-weight: 700;">Praticar Piano</div>
                            <div style="font-size: 0.75rem; color: var(--slate-500);">30 min • Criatividade</div>
                        </div>
                        <span style="color: var(--indigo-400); font-weight: 800;">+30 XP</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURAÇÃO DO SEU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBFxnca6Q1AZBrwdpU07GM2OCd9XIpn4xQ",
            authDomain: "lista-de-presenca-95526.firebaseapp.com",
            projectId: "lista-de-presenca-95526",
            storageBucket: "lista-de-presenca-95526.firebasestorage.app",
            messagingSenderId: "879181560997",
            appId: "1:879181560997:web:484b7aeb865856a7f8a14c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // FUNÇÕES DE LOGIN
        window.handleLogin = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Erro ao logar:", error);
                alert("Erro ao logar com Google. Verifique se o domínio está autorizado no Firebase.");
            }
        };

        window.handleLogout = () => signOut(auth);

        // MONITOR DE USUÁRIO
        onAuthStateChanged(auth, (user) => {
            const loginScreen = document.getElementById('login-screen');
            const userNav = document.getElementById('user-nav');
            
            if (user) {
                // Usuário Logado
                loginScreen.classList.add('hidden');
                userNav.classList.remove('hidden');
                
                // Atualiza UI Básica
                document.getElementById('display-name').innerText = user.displayName;
                document.getElementById('user-display-name').innerText = user.displayName.split(' ')[0];
                document.getElementById('profile-img').src = user.photoURL;
                document.getElementById('user-nav-photo').src = user.photoURL;
                
                // Sincroniza dados do banco
                syncUserData(user.uid);
            } else {
                // Usuário Deslogado
                loginScreen.classList.remove('hidden');
                userNav.classList.add('hidden');
            }
        });

        // SINCRONIZAÇÃO FIRESTORE
        function syncUserData(uid) {
            const userRef = doc(db, "users", uid, "config", "profile");
            
            onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('level-txt').innerText = data.level || 1;
                    document.getElementById('exp-bar').style.width = (data.exp_percent || 10) + "%";
                } else {
                    // Se o usuário é novo, cria o perfil dele
                    setDoc(userRef, { 
                        level: 1, 
                        exp_percent: 10,
                        created_at: new Date()
                    });
                }
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polímata Hub</title>
    <style>
        /* Variáveis de Cores (Paleta Slate/Indigo) */
        :root {
            --bg-dark: #020617;
            --bg-card: rgba(15, 23, 42, 0.8);
            --border-color: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #818cf8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }

        #login-screen {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 0.5s;
        }
        .btn-login {
            background: white; color: black; border: none; padding: 12px 24px;
            border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }
        .hidden { display: none !important; }
        #user-info { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
        #user-photo { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--accent); }

            body {
                background-color: var(--bg-dark);
                color: var(--text-main);
                min-height: 100vh;
                line-height: 1.5;
            }

        /* Scrollbar Customizada */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(30, 41, 59, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.8); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(100, 116, 139, 1); }

        /* Header */
        header {
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 50;
            height: 64px;
        }

        .header-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo { display: flex; align-items: center; gap: 0.5rem; }
        .logo h1 {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Layout Principal */
        main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            main { flex-direction: row; }
        }

        /* Container da Roda */
        #wheel-container {
            flex: 1;
            background: var(--bg-card);
            border-radius: 1.5rem;
            border: 1px solid var(--border-color);
            padding: 2rem;
            position: relative;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @media (min-width: 1024px) { #wheel-container { min-height: 700px; } }

        /* Roda e SVG */
        #polymath-wheel { width: 100%; height: 100%; position: relative; min-height: 400px; }
        #wheel-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

        /* Botão Novo Pilar */
        .btn-add {
            position: absolute;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 9999px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }
        .btn-add:hover { transform: scale(1.1); background: var(--accent-hover); }

        /* Editor e Listas */
        .sidebar { width: 100%; display: flex; flex-direction: column; gap: 1.5rem; }
        @media (min-width: 1024px) { .sidebar { width: 384px; } }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Inputs */
        input[type="text"], textarea {
            width: 100%;
            background: #020617;
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 0.5rem 1rem;
            color: white;
            margin-top: 0.25rem;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent); }

        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }

        /* Animações */
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Classes de Gradiente de Habilidade (Dinâmicas via JS) */
        .grad-blue { background: linear-gradient(to bottom right, #3b82f6, #22d3ee); }
        .grad-purple { background: linear-gradient(to bottom right, #a855f7, #f472b6); }
        .grad-orange { background: linear-gradient(to bottom right, #f97316, #fbbf24); }
        .grad-emerald { background: linear-gradient(to bottom right, #10b981, #2dd4bf); }
        .grad-red { background: linear-gradient(to bottom right, #ef4444, #fb7185); }
        .grad-indigo { background: linear-gradient(to bottom right, #6366f1, #8b5cf6); }

        /* Lista de Pilares */
        .skill-item {
            padding: 0.75rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .skill-item:hover { background: rgba(30, 41, 59, 0.5); }
        .skill-item.active { background: #1e293b; border-color: #334155; }
        
        .dot { width: 12px; height: 12px; border-radius: 50%; }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
        }
        .btn-icon:hover { color: #f87171; background: rgba(248, 113, 113, 0.1); }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="margin-bottom: 2rem; background: linear-gradient(to right, #818cf8, #c084fc); background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.5rem;">Polímata Hub</h1>
    <button onclick="handleLogin()" class="btn-login">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
        Entrar com Google
    </button>
</div>

<header>
    <div class="header-container">
        <div class="logo"><h1>Polímata Hub</h1></div>
        <div id="user-info" class="hidden">
            <span id="user-name"></span>
            <img id="user-photo" src="">
            <button onclick="handleLogout()" style="background:none; border:none; color:#f87171; cursor:pointer; font-size: 10px;">Sair</button>
        </div>
    </div>
</header>

    <main>
        <div id="wheel-container">
            <h2 style="position: absolute; top: 1.5rem; left: 1.5rem; font-size: 1.125rem; font-weight: 500; color: #cbd5e1; display: flex; align-items: center; gap: 0.5rem;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
                Roda de Habilidades
            </h2>
            
            <div id="polymath-wheel">
                <svg id="wheel-svg"></svg>
                <div id="nodes-container"></div>
            </div>

            <button onclick="handleAddSkill()" class="btn-add">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                <span style="font-weight: 500;">Novo Pilar</span>
            </button>
        </div>

        <div class="sidebar">
            <div id="editor-card" class="card"></div>

            <div class="card" style="flex: 1; display: flex; flex-direction: column;">
                <h3 style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"></path><path d="M8 7h6"></path><path d="M8 11h8"></path></svg>
                    Todos os Pilares (<span id="skill-count">0</span>)
                </h3>
                <div id="skills-list" class="custom-scrollbar" style="overflow-y: auto; max-height: 400px; padding-right: 0.5rem;"></div>
            </div>
        </div>
    </main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// 1. Configuração (Suas credenciais)
const firebaseConfig = {
    apiKey: "AIzaSyBFxnca6Q1AZBrwdpU07GM2OCd9XIpn4xQ",
    authDomain: "lista-de-presenca-95526.firebaseapp.com",
    projectId: "lista-de-presenca-95526",
    storageBucket: "lista-de-presenca-95526.firebasestorage.app",
    messagingSenderId: "879181560997",
    appId: "1:879181560997:web:484b7aeb865856a7f8a14c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// 2. Estado Global
let currentUser = null;
let mainGoal = { name: "Carregando...", description: "" };
let skills = [];
let selectedNode = { type: 'main', id: null };
let isEditing = false;
let unsubscribeSkills = null;
let unsubscribeGoal = null;

const colorOptions = ["grad-blue", "grad-purple", "grad-orange", "grad-emerald", "grad-red", "grad-indigo"];

// --- 3. GESTÃO DE USUÁRIO (LOGIN/LOGOUT) ---

window.handleLogin = async () => {
    try {
        await signInWithPopup(auth, provider);
    } catch (error) {
        console.error("Erro no login:", error);
    }
};

window.handleLogout = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
    const loginScreen = document.getElementById('login-screen');
    const userInfo = document.getElementById('user-info');

    if (user) {
        currentUser = user;
        loginScreen.classList.add('hidden');
        userInfo.classList.remove('hidden');
        document.getElementById('user-name').innerText = user.displayName.split(' ')[0];
        document.getElementById('user-photo').src = user.photoURL;
        startSync(user.uid);
    } else {
        currentUser = null;
        loginScreen.classList.remove('hidden');
        userInfo.classList.add('hidden');
        if (unsubscribeSkills) unsubscribeSkills();
        if (unsubscribeGoal) unsubscribeGoal();
    }
});

// --- 4. SINCRONIZAÇÃO EM TEMPO REAL (FIRESTORE) ---

function startSync(uid) {
    // Sincronizar Objetivo Principal
    const goalRef = doc(db, "users", uid, "config", "mainGoal");
    unsubscribeGoal = onSnapshot(goalRef, (docSnap) => {
        if (docSnap.exists()) {
            mainGoal = docSnap.data();
        } else {
            // Cria um perfil padrão para novos usuários
            setDoc(goalRef, { 
                name: "Mestre da Polimatia", 
                description: "Minha visão de mundo e convergência de conhecimentos." 
            });
        }
        render();
    });

    // Sincronizar Pilares (Skills)
    const skillsRef = collection(db, "users", uid, "skills");
    unsubscribeSkills = onSnapshot(skillsRef, (snapshot) => {
        skills = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        render();
    });
}

// --- 5. OPERAÇÕES DE DADOS (CRUD) ---

window.handleAddSkill = async () => {
    if (!currentUser) return;
    const newSkill = {
        name: "Novo Pilar",
        level: 10,
        color: colorOptions[skills.length % colorOptions.length]
    };
    const docRef = await addDoc(collection(db, "users", currentUser.uid, "skills"), newSkill);
    selectedNode = { type: 'skill', id: docRef.id };
    isEditing = true;
};

window.handleDeleteSkill = async (id) => {
    if (confirm("Deseja remover este pilar da sua constelação?")) {
        await deleteDoc(doc(db, "users", currentUser.uid, "skills", id));
        if (selectedNode.id === id) selectedNode = { type: 'main', id: null };
    }
};

window.updateActiveName = async (val) => {
    if (!currentUser) return;
    const ref = selectedNode.type === 'main' 
        ? doc(db, "users", currentUser.uid, "config", "mainGoal")
        : doc(db, "users", currentUser.uid, "skills", selectedNode.id);
    await updateDoc(ref, { name: val });
};

window.updateMainDesc = async (val) => {
    if (selectedNode.type === 'main') {
        await updateDoc(doc(db, "users", currentUser.uid, "config", "mainGoal"), { description: val });
    }
};

window.updateSkillLevel = async (val) => {
    if (selectedNode.type === 'skill') {
        await updateDoc(doc(db, "users", currentUser.uid, "skills", selectedNode.id), { level: parseInt(val) });
    }
};

// --- 6. RENDERIZAÇÃO DA INTERFACE ---

window.selectNode = (type, id) => {
    selectedNode = { type, id };
    isEditing = false;
    render();
};

window.toggleEdit = () => { isEditing = !isEditing; render(); };

function render() {
    renderWheel();
    renderEditor();
    renderList();
}

function renderWheel() {
    const container = document.getElementById('polymath-wheel');
    const nodesContainer = document.getElementById('nodes-container');
    const svg = document.getElementById('wheel-svg');
    if (!container) return;

    const width = container.offsetWidth;
    const height = container.offsetHeight;
    const centerX = width / 2;
    const centerY = height / 2;
    const radius = Math.max(120, Math.min(centerX, centerY) * 0.65);

    nodesContainer.innerHTML = '';
    svg.innerHTML = '';

    // Render Pilar Central
    const isMainSelected = selectedNode.type === 'main';
    const mainDiv = document.createElement('div');
    mainDiv.style.cssText = `position: absolute; left: ${centerX}px; top: ${centerY}px; transform: translate(-50%, -50%); z-index: 20; cursor: pointer; transition: all 0.3s;`;
    if (isMainSelected) mainDiv.style.transform += " scale(1.1)";
    mainDiv.onclick = () => selectNode('main', null);
    mainDiv.innerHTML = `
        <div style="width: 140px; height: 140px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; text-align: center; border: 4px solid ${isMainSelected ? 'var(--accent)' : '#1e293b'}; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(4px); box-shadow: 0 0 30px rgba(0,0,0,0.5);">
            <h3 style="font-size: 0.85rem; color: white;">${mainGoal.name}</h3>
        </div>
    `;
    nodesContainer.appendChild(mainDiv);

    // Render Pilares Periféricos
    skills.forEach((skill, index) => {
        const angle = (index * (2 * Math.PI)) / skills.length - Math.PI / 2;
        const x = centerX + radius * Math.cos(angle);
        const y = centerY + radius * Math.sin(angle);
        const isSelected = selectedNode.id === skill.id;

        // Linha de conexão
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", centerX); line.setAttribute("y1", centerY);
        line.setAttribute("x2", x); line.setAttribute("y2", y);
        line.setAttribute("stroke", isSelected ? "var(--accent)" : "#1e293b");
        line.setAttribute("stroke-width", isSelected ? "2" : "1");
        if (!isSelected) line.setAttribute("stroke-dasharray", "4 4");
        svg.appendChild(line);

        // Nó do Pilar
        const skillDiv = document.createElement('div');
        skillDiv.style.cssText = `position: absolute; left: ${x}px; top: ${y}px; transform: translate(-50%, -50%); z-index: 10; cursor: pointer; transition: all 0.3s;`;
        skillDiv.onclick = () => selectNode('skill', skill.id);
        skillDiv.innerHTML = `
            <div class="${skill.color}" style="width: 85px; height: 85px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-align: center; padding: 10px; color: white; font-size: 10px; font-weight: 600; border: ${isSelected ? '3px solid white' : 'none'}; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                ${skill.name}
            </div>
        `;
        nodesContainer.appendChild(skillDiv);
    });
}

function renderEditor() {
    const card = document.getElementById('editor-card');
    const activeData = selectedNode.type === 'main' ? mainGoal : skills.find(s => s.id === selectedNode.id);
    if (!activeData || !card) return;

    const isMain = selectedNode.type === 'main';

    let content = `
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
            <span style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">${isMain ? 'Objetivo Central' : 'Pilar'}</span>
            <button onclick="toggleEdit()" class="btn-icon" style="background: rgba(255,255,255,0.05); border-radius: 50%; width: 30px; height: 30px;">✎</button>
        </div>
    `;

    if (isEditing) {
        content += `
            <div class="animate-fade-in" style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="text" value="${activeData.name}" oninput="updateActiveName(this.value)" placeholder="Título">
                ${isMain ? 
                    `<textarea oninput="updateMainDesc(this.value)" style="height: 100px;">${activeData.description}</textarea>` : 
                    `<div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem;">
                            <label>Domínio: ${activeData.level}%</label>
                        </div>
                        <input type="range" min="0" max="100" value="${activeData.level}" oninput="updateSkillLevel(this.value)">
                    </div>`
                }
                <button onclick="toggleEdit()" style="background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer;">Salvar</button>
            </div>
        `;
    } else {
        content += `
            <div class="animate-fade-in">
                <h3 style="font-size: 1.4rem; margin-bottom: 0.5rem;">${activeData.name}</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem;">${isMain ? activeData.description : 'Seu nível de progresso neste pilar é de ' + activeData.level + '%.'}</p>
            </div>
        `;
    }
    card.innerHTML = content;
}

function renderList() {
    const list = document.getElementById('skills-list');
    if (!list) return;
    document.getElementById('skill-count').innerText = skills.length;
    
    list.innerHTML = skills.length === 0 
        ? '<p style="font-size: 0.8rem; color: var(--text-muted); text-align: center; margin-top: 1rem;">Nenhum pilar cadastrado.</p>'
        : skills.map(s => `
            <div class="skill-item ${selectedNode.id === s.id ? 'active' : ''}" onclick="selectNode('skill', '${s.id}')">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="dot ${s.color}"></div>
                    <div>
                        <div style="font-size: 0.9rem; font-weight: 500;">${s.name}</div>
                        <div style="font-size: 0.7rem; color: var(--text-muted);">${s.level}% Dominado</div>
                    </div>
                </div>
                <button onclick="event.stopPropagation(); handleDeleteSkill('${s.id}')" class="btn-icon">✕</button>
            </div>
        `).join('');
}

window.onresize = render;
</script>
</body>
</html>

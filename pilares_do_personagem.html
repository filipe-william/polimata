<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polímata Hub</title>
    <style>
        /* Variáveis de Cores (Paleta Slate/Indigo) */
        :root {
            --bg-dark: #020617;
            --bg-card: rgba(15, 23, 42, 0.8);
            --border-color: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #818cf8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* Scrollbar Customizada */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(30, 41, 59, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.8); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(100, 116, 139, 1); }

        /* Header */
        header {
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 50;
            height: 64px;
        }

        .header-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo { display: flex; align-items: center; gap: 0.5rem; }
        .logo h1 {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Layout Principal */
        main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            main { flex-direction: row; }
        }

        /* Container da Roda */
        #wheel-container {
            flex: 1;
            background: var(--bg-card);
            border-radius: 1.5rem;
            border: 1px solid var(--border-color);
            padding: 2rem;
            position: relative;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @media (min-width: 1024px) { #wheel-container { min-height: 700px; } }

        /* Roda e SVG */
        #polymath-wheel { width: 100%; height: 100%; position: relative; min-height: 400px; }
        #wheel-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

        /* Botão Novo Pilar */
        .btn-add {
            position: absolute;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 9999px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }
        .btn-add:hover { transform: scale(1.1); background: var(--accent-hover); }

        /* Editor e Listas */
        .sidebar { width: 100%; display: flex; flex-direction: column; gap: 1.5rem; }
        @media (min-width: 1024px) { .sidebar { width: 384px; } }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Inputs */
        input[type="text"], textarea {
            width: 100%;
            background: #020617;
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 0.5rem 1rem;
            color: white;
            margin-top: 0.25rem;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent); }

        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }

        /* Animações */
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Classes de Gradiente de Habilidade (Dinâmicas via JS) */
        .grad-blue { background: linear-gradient(to bottom right, #3b82f6, #22d3ee); }
        .grad-purple { background: linear-gradient(to bottom right, #a855f7, #f472b6); }
        .grad-orange { background: linear-gradient(to bottom right, #f97316, #fbbf24); }
        .grad-emerald { background: linear-gradient(to bottom right, #10b981, #2dd4bf); }
        .grad-red { background: linear-gradient(to bottom right, #ef4444, #fb7185); }
        .grad-indigo { background: linear-gradient(to bottom right, #6366f1, #8b5cf6); }

        /* Lista de Pilares */
        .skill-item {
            padding: 0.75rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .skill-item:hover { background: rgba(30, 41, 59, 0.5); }
        .skill-item.active { background: #1e293b; border-color: #334155; }
        
        .dot { width: 12px; height: 12px; border-radius: 50%; }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
        }
        .btn-icon:hover { color: #f87171; background: rgba(248, 113, 113, 0.1); }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
                <h1>Polímata Hub</h1>
            </div>
            <div style="font-size: 0.875rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.5rem;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>
                <span>Sua constelação de conhecimento</span>
            </div>
        </div>
    </header>

    <main>
        <div id="wheel-container">
            <h2 style="position: absolute; top: 1.5rem; left: 1.5rem; font-size: 1.125rem; font-weight: 500; color: #cbd5e1; display: flex; align-items: center; gap: 0.5rem;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
                Roda de Habilidades
            </h2>
            
            <div id="polymath-wheel">
                <svg id="wheel-svg"></svg>
                <div id="nodes-container"></div>
            </div>

            <button onclick="handleAddSkill()" class="btn-add">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                <span style="font-weight: 500;">Novo Pilar</span>
            </button>
        </div>

        <div class="sidebar">
            <div id="editor-card" class="card"></div>

            <div class="card" style="flex: 1; display: flex; flex-direction: column;">
                <h3 style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"></path><path d="M8 7h6"></path><path d="M8 11h8"></path></svg>
                    Todos os Pilares (<span id="skill-count">0</span>)
                </h3>
                <div id="skills-list" class="custom-scrollbar" style="overflow-y: auto; max-height: 400px; padding-right: 0.5rem;"></div>
            </div>
        </div>
    </main>

    <script>
        // --- ESTADO ---
        let mainGoal = {
            name: "Mestre da Inovação Tecnológica e Artística",
            description: "Unir lógica computacional com expressão criativa para criar novas mídias."
        };

        let skills = [
            { id: 1, name: "Engenharia de Software", level: 85, color: "grad-blue" },
            { id: 2, name: "Filosofia Moderna", level: 60, color: "grad-purple" },
            { id: 3, name: "Design Gráfico", level: 70, color: "grad-orange" },
            { id: 4, name: "Física Quântica", level: 30, color: "grad-emerald" },
            { id: 5, name: "Música (Piano)", level: 55, color: "grad-red" },
            { id: 6, name: "Oratória", level: 75, color: "grad-indigo" }
        ];

        let selectedNode = { type: 'main', id: null };
        let isEditing = false;

        const colorOptions = ["grad-blue", "grad-purple", "grad-orange", "grad-emerald", "grad-red", "grad-indigo"];

        // --- LÓGICA ---
        function handleAddSkill() {
            const newSkill = {
                id: Date.now(),
                name: "Novo Pilar",
                level: 10,
                color: colorOptions[skills.length % colorOptions.length]
            };
            skills.push(newSkill);
            selectedNode = { type: 'skill', id: newSkill.id };
            isEditing = true;
            render();
        }

        function handleDeleteSkill(id) {
            skills = skills.filter(s => s.id !== id);
            if (selectedNode.id === id) selectedNode = { type: 'main', id: null };
            render();
        }

        function selectNode(type, id) {
            selectedNode = { type, id };
            isEditing = false;
            render();
        }

        // --- RENDERIZAÇÃO ---
        function render() {
            renderWheel();
            renderEditor();
            renderList();
        }

        function renderWheel() {
            const container = document.getElementById('polymath-wheel');
            const nodesContainer = document.getElementById('nodes-container');
            const svg = document.getElementById('wheel-svg');
            
            const width = container.offsetWidth;
            const height = container.offsetHeight;
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.max(120, Math.min(centerX, centerY) * 0.65);

            nodesContainer.innerHTML = '';
            svg.innerHTML = '';

            // Centro
            const isMainSelected = selectedNode.type === 'main';
            const mainDiv = document.createElement('div');
            mainDiv.style.cssText = `position: absolute; left: ${centerX}px; top: ${centerY}px; transform: translate(-50%, -50%); z-index: 20; cursor: pointer; transition: all 0.3s;`;
            if (isMainSelected) mainDiv.style.transform += " scale(1.1)";

            mainDiv.onclick = () => selectNode('main', null);
            mainDiv.innerHTML = `
                <div style="width: 140px; height: 140px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; text-align: center; border: 4px solid ${isMainSelected ? '#818cf8' : '#334155'}; background: ${isMainSelected ? 'rgba(49, 46, 129, 0.6)' : 'rgba(15, 23, 42, 0.9)'}; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); backdrop-filter: blur(4px);">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="${isMainSelected ? '#a5b4fc' : '#64748b'}" stroke-width="2" style="margin-bottom: 8px;"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-2.54Z"></path><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-2.54Z"></path></svg>
                    <h3 style="font-size: 0.85rem; font-weight: bold; color: white; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.2;">${mainGoal.name}</h3>
                </div>
            `;
            nodesContainer.appendChild(mainDiv);

            // Skills
            skills.forEach((skill, index) => {
                const angle = (index * (2 * Math.PI)) / skills.length - Math.PI / 2;
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                const isSelected = selectedNode.id === skill.id;

                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", centerX); line.setAttribute("y1", centerY);
                line.setAttribute("x2", x); line.setAttribute("y2", y);
                line.setAttribute("stroke", isSelected || isMainSelected ? "rgba(99, 102, 241, 0.5)" : "rgba(51, 65, 85, 0.5)");
                line.setAttribute("stroke-width", isSelected ? "3" : "1.5");
                if (!isSelected) line.setAttribute("stroke-dasharray", "4 4");
                svg.appendChild(line);

                const skillDiv = document.createElement('div');
                skillDiv.style.cssText = `position: absolute; left: ${x}px; top: ${y}px; transform: translate(-50%, -50%); z-index: 10; cursor: pointer; transition: all 0.5s;`;
                if (isSelected) skillDiv.style.zIndex = "30";
                
                skillDiv.onclick = () => selectNode('skill', skill.id);
                skillDiv.innerHTML = `
                    <div style="width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; background: #0f172a; border: 2px solid ${isSelected ? 'transparent' : '#334155'}; transform: ${isSelected ? 'scale(1.2)' : 'scale(1)'}">
                        ${isSelected ? `<div class="${skill.color}" style="position: absolute; inset: -4px; border-radius: 50%; opacity: 0.6; filter: blur(4px); z-index: -1;"></div>` : ''}
                        ${isSelected ? `<div class="${skill.color}" style="position: absolute; inset: -2px; border-radius: 50%; z-index: -1;"></div>` : ''}
                        <div style="text-align: center; padding: 0 8px; z-index: 10;">
                            <p style="font-size: 10px; font-weight: 600; color: #cbd5e1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${skill.name}</p>
                            ${isSelected ? `<p style="font-size: 10px; color: #94a3b8; font-family: monospace;">${skill.level}%</p>` : ''}
                        </div>
                    </div>
                `;
                nodesContainer.appendChild(skillDiv);
            });
        }

        function renderEditor() {
            const card = document.getElementById('editor-card');
            const activeData = selectedNode.type === 'main' ? mainGoal : skills.find(s => s.id === selectedNode.id);
            if (!activeData) return;

            const isMain = selectedNode.type === 'main';

            let content = `
                <div style="position: absolute; top: -100px; right: -100px; width: 200px; height: 200px; border-radius: 50%; filter: blur(60px); opacity: 0.15; pointer-events: none;" class="${isMain ? 'grad-indigo' : activeData.color}"></div>
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
                    <span style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted);">${isMain ? 'Objetivo Central' : 'Pilar Secundário'}</span>
                    <button onclick="toggleEdit()" class="btn-icon" style="background: rgba(30,41,59,0.5); padding: 8px;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"></path><path d="m15 5 4 4"></path></svg>
                    </button>
                </div>
            `;

            if (isEditing) {
                content += `
                    <div class="animate-fade-in" style="display: flex; flex-direction: column; gap: 1rem;">
                        <div>
                            <label style="font-size: 0.875rem; color: var(--text-muted);">Título</label>
                            <input type="text" value="${activeData.name}" oninput="updateActiveName(this.value)">
                        </div>
                        ${isMain ? `
                            <div>
                                <label style="font-size: 0.875rem; color: var(--text-muted);">Visão</label>
                                <textarea oninput="updateMainDesc(this.value)" style="height: 100px; resize: none;">${activeData.description}</textarea>
                            </div>
                        ` : `
                            <div>
                                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                                    <label style="font-size: 0.875rem; color: var(--text-muted);">Nível</label>
                                    <span style="color: var(--accent); font-weight: bold;">${activeData.level}%</span>
                                </div>
                                <input type="range" min="0" max="100" value="${activeData.level}" oninput="updateSkillLevel(this.value)">
                            </div>
                        `}
                        <button onclick="toggleEdit()" style="width: 100%; background: #1e293b; color: white; border: none; padding: 0.6rem; border-radius: 0.75rem; cursor: pointer; margin-top: 0.5rem;">Concluir</button>
                    </div>
                `;
            } else {
                content += `
                    <div class="animate-fade-in">
                        <h3 style="font-size: 1.5rem; font-weight: bold; color: white; margin-bottom: 0.5rem;">${activeData.name}</h3>
                        ${isMain ? `<p style="color: var(--text-muted);">${activeData.description}</p>` : `
                            <div style="margin-top: 1.5rem;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                                    <span style="font-size: 0.875rem; color: var(--text-muted);">Progresso</span>
                                    <span style="font-weight: bold; color: white;">${activeData.level}%</span>
                                </div>
                                <div style="width: 100%; background: #1e293b; height: 12px; border-radius: 999px; overflow: hidden;">
                                    <div class="${activeData.color}" style="height: 100%; width: ${activeData.level}%; transition: width 0.3s;"></div>
                                </div>
                            </div>
                        `}
                    </div>
                `;
            }
            card.innerHTML = content;
        }

        function renderList() {
            const list = document.getElementById('skills-list');
            document.getElementById('skill-count').innerText = skills.length;
            
            if (skills.length === 0) {
                list.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.875rem;">Nenhum pilar adicionado.</div>';
                return;
            }

            list.innerHTML = '';
            skills.forEach(skill => {
                const isSelected = selectedNode.id === skill.id;
                const div = document.createElement('div');
                div.className = `skill-item ${isSelected ? 'active' : ''}`;
                div.onclick = () => selectNode('skill', skill.id);
                div.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <div class="dot ${skill.color}"></div>
                        <div>
                            <div style="font-weight: 500; color: ${isSelected ? 'white' : '#e2e8f0'};">${skill.name}</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">Nível ${skill.level}%</div>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <button onclick="event.stopPropagation(); handleDeleteSkill(${skill.id})" class="btn-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // --- HANDLERS ---
        function toggleEdit() { isEditing = !isEditing; render(); }
        
        function updateActiveName(val) {
            if (selectedNode.type === 'main') mainGoal.name = val;
            else {
                const skill = skills.find(s => s.id === selectedNode.id);
                if (skill) skill.name = val;
            }
            renderWheel(); 
        }

        function updateMainDesc(val) { mainGoal.description = val; }
        
        function updateSkillLevel(val) {
            const skill = skills.find(s => s.id === selectedNode.id);
            if (skill) {
                skill.level = parseInt(val);
                render();
            }
        }

        window.onresize = render;
        render();
    </script>
</body>
</html>
